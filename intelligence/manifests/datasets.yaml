datasets:
  - key: raw_inbox
    path: raw/inbox/
    role: incoming immutable source material awaiting registration or ingest
    truth_class: source
    owner: human
  - key: raw_processed
    path: raw/processed/
    role: immutable source material already incorporated into the workspace
    truth_class: source
    owner: human
  - key: warehouse_messages
    path: warehouse/jsonl/messages.jsonl
    role: canonical conversational or event-level registry when the corpus is sequential
    truth_class: canonical
    owner: ontology
  - key: warehouse_documents
    path: warehouse/jsonl/documents.jsonl
    role: canonical document registry
    truth_class: canonical
    owner: ontology
  - key: warehouse_source_versions
    path: warehouse/jsonl/source_versions.jsonl
    role: canonical export snapshot registry for repeated source families
    truth_class: canonical
    owner: ontology
  - key: warehouse_entities
    path: warehouse/jsonl/entities.jsonl
    role: canonical entity registry
    truth_class: canonical
    owner: ontology
  - key: warehouse_claims
    path: warehouse/jsonl/claims.jsonl
    role: canonical claim registry
    truth_class: canonical
    owner: ontology
  - key: warehouse_claim_evidence
    path: warehouse/jsonl/claim_evidence.jsonl
    role: canonical claim-to-evidence registry
    truth_class: canonical
    owner: ontology
  - key: warehouse_segments
    path: warehouse/jsonl/segments.jsonl
    role: canonical stable text-reference segments
    truth_class: canonical
    owner: ontology
  - key: warehouse_derived_edges
    path: warehouse/jsonl/derived_edges.jsonl
    role: derived relation edges materialized from canonical claims
    truth_class: derived
    owner: ontology
  - key: wiki_sources
    path: wiki/sources/
    role: human-facing per-source synthesis pages
    truth_class: human_facing
    owner: wiki
  - key: wiki_entities
    path: wiki/entities/
    role: human-facing entity pages
    truth_class: human_facing
    owner: wiki
  - key: wiki_people
    path: wiki/people/
    role: human-facing person pages
    truth_class: human_facing
    owner: wiki
  - key: wiki_concepts
    path: wiki/concepts/
    role: human-facing concept pages
    truth_class: human_facing
    owner: wiki
  - key: wiki_projects
    path: wiki/projects/
    role: human-facing project pages
    truth_class: human_facing
    owner: wiki
  - key: wiki_analyses
    path: wiki/analyses/
    role: durable answer and synthesis pages
    truth_class: human_facing
    owner: wiki
  - key: wiki_meta_index
    path: wiki/_meta/index.md
    role: sectioned page inventory for the human-facing wiki surface
    truth_class: human_facing
    owner: wiki
  - key: wiki_meta_log
    path: wiki/_meta/log.md
    role: durable operational log for ingest, query, lint, and refactor work
    truth_class: human_facing
    owner: wiki
  - key: graph_projection
    path: warehouse/graph_projection/
    role: optional graph-style exploration layer exported from canonical truth
    truth_class: derived
    owner: graph
  - key: warehouse_graph_projection_summary
    path: warehouse/graph_projection/summary.json
    role: summary artifact describing availability and counts for the derived graph projection
    truth_class: derived
    owner: graph
  - key: source_family_manifest
    path: intelligence/manifests/source_families.yaml
    role: declarative mapping for recurring source families and parser assumptions
    truth_class: contract
    owner: operator
  - key: workbench_manifest
    path: intelligence/manifests/workbench.yaml
    role: declarative contract for sidecar workbench routes, actions, and mutation boundaries
    truth_class: contract
    owner: operator
  - key: contract_index
    path: intelligence/contract_index.yaml
    role: entrypoint listing the current YAML contract read order for agents and validators
    truth_class: contract
    owner: operator
  - key: semantic_boundary_policy
    path: intelligence/policies/semantic_boundary.yaml
    role: deterministic-vs-LLM semantic boundary and no-fallback policy
    truth_class: contract
    owner: operator
  - key: proposal_lifecycle_policy
    path: intelligence/policies/proposal_lifecycle.yaml
    role: compile proposal status, trust, queryability, and human-review transition policy
    truth_class: contract
    owner: operator
  - key: semantic_workflows_manifest
    path: intelligence/manifests/semantic_workflows.yaml
    role: strict LLM-first compile/query workflow contract
    truth_class: contract
    owner: operator
  - key: page_policy_manifest
    path: intelligence/manifests/page_policy.yaml
    role: runtime query-evidence filtering policy for wiki pages
    truth_class: contract
    owner: operator
  - key: meta_surfaces_manifest
    path: intelligence/manifests/meta_surfaces.yaml
    role: map-first wiki navigation surface contract for LLM query and compile bundles
    truth_class: contract
    owner: operator
  - key: relation_types_manifest
    path: intelligence/manifests/relation_types.yaml
    role: relation vocabulary and structural policy contract, not asserted relation facts
    truth_class: contract
    owner: operator
  - key: registries_manifest
    path: intelligence/manifests/registries.yaml
    role: JSONL registry shape and reference contract
    truth_class: contract
    owner: operator
