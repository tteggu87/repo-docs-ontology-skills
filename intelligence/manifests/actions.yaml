actions:
  - key: register_source
    description: Register an incoming raw source and create or update a matching wiki source stub.
    inputs:
      - raw/inbox/<source>
    outputs:
      - wiki/sources/<source-page>
      - wiki/_meta/log.md
      - wiki/_meta/index.md
    reads:
      - raw/inbox/
      - templates/source_page_template.md
    writes:
      - wiki/sources/
      - wiki/_meta/
    notes:
      - This is lighter than ontology-backed ingest and may be used when canonical extraction is not yet available.
  - key: ingest_with_ontology
    description: Read a raw source, refresh canonical ontology registries, rebuild derived graph artifacts when requested, and prepare shadow reconcile previews for explicit wiki promotion.
    inputs:
      - raw/inbox/<source>
    outputs:
      - warehouse/jsonl/messages.jsonl
      - warehouse/jsonl/documents.jsonl
      - warehouse/jsonl/entities.jsonl
      - warehouse/jsonl/claims.jsonl
      - warehouse/jsonl/claim_evidence.jsonl
      - warehouse/jsonl/segments.jsonl
      - warehouse/jsonl/derived_edges.jsonl
      - warehouse/graph_projection/
      - wiki/state/ontology_reconcile_preview.json when shadow reconcile is requested
    reads:
      - raw/inbox/
      - warehouse/jsonl/
      - wiki/sources/
    writes:
      - warehouse/jsonl/
      - warehouse/graph_projection/
      - wiki/state/
    notes:
      - This action is the current production-oriented raw-first ingest path.
      - Canonical truth refresh is real, but wiki promotion should remain shadow-first and explicitly reviewed.
      - Do not silently rewrite source pages from ontology output.
  - key: ingest_incremental_export
    description: Read a repeated export for a known source family, register the export version, upsert canonical sequential records, and then refresh the affected wiki pages.
    inputs:
      - raw/inbox/<cumulative-export>
      - intelligence/manifests/source_families.yaml
    outputs:
      - warehouse/jsonl/source_versions.jsonl
      - warehouse/jsonl/messages.jsonl
      - warehouse/jsonl/documents.jsonl
      - wiki/sources/
      - wiki/_meta/index.md
      - wiki/_meta/log.md
    reads:
      - raw/inbox/
      - intelligence/manifests/source_families.yaml
      - warehouse/jsonl/
      - wiki/
    writes:
      - warehouse/jsonl/
      - wiki/
      - wiki/_meta/
    notes:
      - This action is for repeated exports such as A then A+B and should remain lightweight.
      - Manifests define family matching and dataset boundaries, but runtime logic still performs fingerprinting and upsert.
  - key: answer_query
    description: Answer a user question using wiki pages first, with ontology-backed verification when needed, then persist durable answers.
    inputs:
      - user question
    outputs:
      - chat answer
      - wiki/analyses/<analysis-page> when durable
      - wiki/_meta/log.md
    reads:
      - wiki/_meta/index.md
      - wiki/
      - warehouse/jsonl/
    writes:
      - wiki/analyses/
      - wiki/_meta/log.md
    notes:
      - Prefer wiki as the human-facing answer surface and use ontology registries for provenance, contradictions, and coverage checks.
  - key: preview_query_local
    description: Produce a repo-local query preview from wiki pages plus canonical registry hits without mutating canonical truth.
    inputs:
      - user question
      - wiki/
      - warehouse/jsonl/
    outputs:
      - preview answer markdown
      - related wiki pages
      - related source pages
      - provenance sections
      - graph hints when a derived projection is available
      - explicit route / truth-layer / fallback / save-readiness contract metadata
      - warnings for thin or missing coverage
    reads:
      - wiki/
      - warehouse/jsonl/entities.jsonl
      - warehouse/jsonl/claims.jsonl
      - warehouse/jsonl/segments.jsonl
      - warehouse/graph_projection/
    writes: []
    notes:
      - This is the current Ask workspace contract exposed through the workbench adapter.
      - It is a routing and draft surface, not a hidden autonomous generation path.
      - Graph projection remains derived/read-only and only contributes bounded hints.
  - key: save_query_analysis_draft
    description: Save a durable analysis page from a repo-local query preview and add bounded link-backs on confident related pages.
    inputs:
      - query preview result
      - user question
    outputs:
      - wiki/analyses/<analysis-page>
      - wiki/_meta/log.md
      - wiki/_meta/index.md
      - related wiki page link-backs when confidence is sufficient
    reads:
      - wiki/
      - warehouse/jsonl/
    writes:
      - wiki/analyses/
      - wiki/_meta/log.md
      - wiki/_meta/index.md
      - selected wiki pages under the allowed workbench write scope
    notes:
      - This is backend-gated and intentionally bounded to wiki-facing durable outputs.
  - key: review_claim_state
    description: Update canonical claim review state through the backend while keeping browser-side mutation restricted.
    inputs:
      - claim id
      - target review state
    outputs:
      - warehouse/jsonl/claims.jsonl
      - wiki/_meta/log.md
    reads:
      - warehouse/jsonl/claims.jsonl
    writes:
      - warehouse/jsonl/claims.jsonl
      - wiki/_meta/log.md
    notes:
      - The current workbench contract allows canonical claim review updates only for claims, not arbitrary registry mutation.
      - Review actions may also refresh derived claim contract fields such as support standing and lifecycle state.
  - key: run_workbench_maintenance_action
    description: Run an explicit maintenance command through the workbench adapter for status, reindex, lint, or doctor.
    inputs:
      - action key
    outputs:
      - structured command output
    reads:
      - scripts/llm_wiki.py
    writes:
      - wiki/_meta/index.md when action is reindex
    notes:
      - Allowed actions are intentionally limited to status, reindex, lint, and doctor.
