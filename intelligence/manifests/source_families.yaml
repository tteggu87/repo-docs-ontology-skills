source_families:
  - key: kakao-agent-korea-chat
    source_kind: kakao_chat_export
    match:
      path_contains:
        - KakaoTalk_Chat_
        - 에이전트코리아
    default_parser: kakao_chat_csv
    notes:
      - Use this family for cumulative exports of the same Agent Korea KakaoTalk room.
      - Matching stays declarative here; runtime logic is responsible for fingerprinting and version registration.

  - key: markdown-note-export
    source_kind: markdown_note_export
    match:
      path_contains:
        - note-export-
        - .md
    default_parser: markdown_note
    notes:
      - Use this family for repeated markdown note exports that should register through the same incremental ingest path.

defaults:
  unknown_family_policy: require_explicit_mapping_or_clear_filename_match
  family_identity_rule: one recurring corpus per family, many export versions per family
