source_families:
  - key: kakao-agent-korea-chat
    source_kind: kakao_chat_export
    status: test_fixture
    match:
      path_contains:
        - KakaoTalk_Chat_
        - 에이전트코리아
    default_parser: kakao_chat_csv
    notes:
      - Compatibility fixture family for regression tests.

  - key: email-md-txt
    source_kind: email_document
    status: built_in
    match:
      path_contains:
        - /email/
    default_parser: email_md_txt

  - key: education-md-txt
    source_kind: education_document
    status: built_in
    match:
      path_contains:
        - /education/
    default_parser: education_md_txt

  - key: report-md-txt
    source_kind: report_document
    status: built_in
    match:
      path_contains:
        - /reports/
    default_parser: report_md_txt

  - key: markdown-note-export
    source_kind: markdown_note_export
    match:
      path_contains:
        - note-export-
        - .md
    default_parser: markdown_note

defaults:
  unknown_family_policy: require_explicit_mapping_or_clear_filename_match
  family_identity_rule: one recurring corpus per family, many export versions per family
