version: 1

workbench:
  status: active
  frontend:
    path: apps/workbench/
    runtime: optional React and Vite app
    role: operator and reader surface for the repository
    responsibilities:
      - render the current ask workspace and wiki reader surfaces
      - keep additional backend capabilities decoupled from the default frontend until productized
      - call only explicit adapter APIs
    forbidden:
      - direct filesystem writes from the browser
      - browser-side model API keys or model secrets
      - direct mutation of raw or canonical truth
      - direct access to `wikiconfig.json` or provider internals

  backend:
    path: scripts/workbench_api.py
    runtime: Python adapter
    role: thin workbench adapter over repo files and existing scripts
    responsibilities:
      - expose repo data for the workbench
      - gate bounded operator actions
      - gate bounded wiki draft writes
      - optionally load repo-root `wikiconfig.json` for bounded helper-model actions
      - keep command execution explicit and auditable
    forbidden:
      - treating derived graph data as canonical truth
      - hidden model orchestration behind the browser
      - parent-directory or workspace-wide config discovery for helper-model config

  read_surfaces:
    - key: dashboard_summary
      method: GET
      path: /api/workbench/summary
      reads:
        - raw/inbox/
        - raw/processed/
        - wiki/_meta/index.md
        - wiki/_meta/log.md
        - warehouse/jsonl/
        - warehouse/graph_projection/
      returns:
        - corpus counts
        - freshness signals
        - warning flags
        - optional graph availability summary

    - key: wiki_index
      method: GET
      path: /api/wiki/index
      reads:
        - wiki/_meta/index.md
      returns:
        - sectioned page inventory

    - key: wiki_page
      method: GET
      path: /api/wiki/page/<stem>
      reads:
        - wiki/
      returns:
        - page frontmatter
        - markdown content
        - related internal links when available

    - key: wiki_related
      method: GET
      path: /api/wiki/related/<stem>
      reads:
        - wiki/
      returns:
        - related page suggestions
        - backlink and shared-link context when available

    - key: source_detail
      method: GET
      path: /api/sources/<stem>
      reads:
        - wiki/sources/
        - raw/inbox/
        - raw/processed/
        - warehouse/jsonl/source_versions.jsonl
      returns:
        - source page content
        - raw path metadata
        - incremental status summary when present
        - source-family lineage and affected surface paths when present
        - source coverage counts from canonical registries
        - source-local claim review queue
        - related page suggestions

    - key: workbench_feed
      method: GET
      path: /api/workbench/feed
      reads:
        - wiki/sources/
        - wiki/analyses/
      returns:
        - recent source pages
        - recent analysis pages

    - key: workbench_review
      method: GET
      path: /api/workbench/review
      reads:
        - wiki/
        - warehouse/jsonl/claims.jsonl
      returns:
        - low-coverage page candidates
        - stale page candidates
        - uncertainty review candidates
        - low-confidence claim review queue

    - key: query_preview
      method: GET
      path: /api/query/preview?q=<question>
      reads:
        - wiki/
        - warehouse/jsonl/
      returns:
        - repo-local query preview
        - related pages and source pages
        - provenance sections
        - explicit thin/empty coverage warnings

    - key: warehouse_summary
      method: GET
      path: /api/warehouse/summary
      reads:
        - warehouse/jsonl/
      returns:
        - registry counts
        - sample previews
        - canonical versus derived summary

    - key: recent_log
      method: GET
      path: /api/meta/log/recent
      reads:
        - wiki/_meta/log.md
      returns:
        - recent log entries

  action_surfaces:
    - key: status
      method: POST
      path: /api/actions/status
      wraps:
        - python3 scripts/llm_wiki.py status
      writes: []
      output_contract:
        - show the exact command
        - show structured command output in the UI

    - key: reindex
      method: POST
      path: /api/actions/reindex
      wraps:
        - python3 scripts/llm_wiki.py reindex
      writes:
        - wiki/_meta/index.md
      output_contract:
        - show the exact command
        - show structured command output in the UI

    - key: lint
      method: POST
      path: /api/actions/lint
      wraps:
        - python3 scripts/llm_wiki.py lint
      writes: []
      output_contract:
        - show the exact command
        - show structured command output in the UI

    - key: save_analysis
      method: POST
      path: /api/actions/save-analysis
      wraps:
        - backend-gated analysis draft generation from repo-local query preview
      writes:
        - wiki/analyses/
        - wiki/_meta/log.md
        - wiki/_meta/index.md
        - related wiki pages with sufficient confidence for link-back
      output_contract:
        - show changed files
        - show saved analysis path
        - show linked wiki pages when link-back occurs
        - keep `raw/` and `warehouse/jsonl/` untouched

    - key: review_claim
      method: POST
      path: /api/actions/review-claim
      wraps:
        - backend-gated claim review update in canonical registries
      writes:
        - warehouse/jsonl/claims.jsonl
        - wiki/_meta/log.md
      output_contract:
        - show changed files
        - show updated claim id and review state
        - keep `raw/` untouched

    - key: draft_source_summary
      method: POST
      path: /api/actions/draft-source-summary
      wraps:
        - backend-only helper-model draft generation for one source page
      reads:
        - repo-root wikiconfig.json
        - wiki/sources/
        - raw/inbox/
        - raw/processed/
        - raw/notes/
      writes: []
      output_contract:
        - return draft markdown only
        - return no provider secrets or provider internals
        - keep `raw/` and `warehouse/jsonl/` untouched

  mutation_policy:
    - raw is immutable except on explicit user instruction
    - warehouse/jsonl remains canonical and must not be edited directly from the browser
    - wiki writes, if later allowed, must go through explicit backend-gated actions
    - graph projection is derived and read-only in the workbench
    - ask flows must use backend mediation or explicit repo-local search contracts
    - ask preview may save bounded analysis drafts only through explicit backend-gated actions
    - helper-model config may be loaded only from repo-root `wikiconfig.json`
    - helper-model actions must remain draft-only and must not write canonical truth

  v1_defaults:
    - ask workspace is the current home surface
    - page reader remains wiki-first
    - ask is a repo-local query preview with explicit provenance and weak-coverage states
    - operator review, source, warehouse, doctor, and graph contracts may exist in the backend without being mounted in the default frontend
