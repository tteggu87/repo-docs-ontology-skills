capabilities:
  - key: wiki.status
    action: run_workbench_maintenance_action
    implementation: scripts/llm_wiki.py:status
    entrypoint: python3 scripts/llm_wiki.py status
  - key: wiki.reindex
    action: run_workbench_maintenance_action
    implementation: scripts/llm_wiki.py:rebuild_index
    entrypoint: python3 scripts/llm_wiki.py reindex
  - key: wiki.lint
    action: run_workbench_maintenance_action
    implementation: scripts/llm_wiki.py:lint_wiki
    entrypoint: python3 scripts/llm_wiki.py lint
  - key: wiki.doctor
    action: run_workbench_maintenance_action
    implementation: scripts/llm_wiki.py:build_doctor_payload
    entrypoint: python3 scripts/llm_wiki.py doctor --json
  - key: source.ingest.register
    action: register_source
    implementation: scripts/llm_wiki.py:ingest_source
    entrypoint: python3 scripts/llm_wiki.py ingest <path> [--title ...]
  - key: source.ingest.incremental
    action: ingest_incremental_export
    implementation: scripts/incremental_ingest.py:ingest_incremental
    entrypoint: python3 scripts/incremental_ingest.py <raw_source> [--project-root ...]
  - key: workbench.summary
    action: read_workbench_summary
    implementation: scripts/workbench/repository.py:summary
    entrypoint: GET /api/workbench/summary
  - key: workbench.review.summary
    action: read_workbench_review
    implementation: scripts/workbench/repository.py:review_summary
    entrypoint: GET /api/workbench/review
  - key: workbench.source.detail
    action: read_source_detail
    implementation: scripts/workbench/repository.py:source_detail
    entrypoint: GET /api/sources/<stem>
  - key: workbench.query.preview
    action: preview_query_local
    implementation: scripts/workbench/repository.py:query_preview
    entrypoint: GET /api/query/preview?q=<question>
  - key: workbench.graph.inspect
    action: inspect_graph_projection
    implementation: scripts/workbench/repository.py:graph_inspect
    entrypoint: GET /api/graph/inspect?seed_type=<type>&seed=<value>
  - key: workbench.warehouse.summary
    action: read_warehouse_summary
    implementation: scripts/workbench/repository.py:warehouse_summary
    entrypoint: GET /api/warehouse/summary
  - key: workbench.analysis.save
    action: save_query_analysis_draft
    implementation: scripts/workbench/repository.py:save_query_analysis
    entrypoint: POST /api/actions/save-analysis
  - key: workbench.claim.review
    action: review_claim_state
    implementation: scripts/workbench/repository.py:review_claim
    entrypoint: POST /api/actions/review-claim
  - key: workbench.source.summary_draft
    action: draft_source_summary
    implementation: scripts/workbench/repository.py:draft_source_summary
    entrypoint: POST /api/actions/draft-source-summary
