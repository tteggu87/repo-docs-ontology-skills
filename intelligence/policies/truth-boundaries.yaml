policies:
  - key: truth-priority
    intent: Keep repository truth boundaries explicit and ordered.
    rules:
      - raw/ is immutable source truth
      - warehouse/jsonl/ is canonical structured machine truth
      - wiki/ is maintained human-facing synthesis
      - warehouse/graph_projection/ is derived and read-only
  - key: workbench-mutation-boundary
    intent: Keep the sidecar workbench additive and bounded.
    rules:
      - Browser surfaces must not write directly to raw/
      - Browser surfaces must not mutate canonical registries except through explicit backend-gated claim review
      - Backend-gated analysis saves may write only within the documented allowed wiki scope
      - Graph projection remains read-only in the workbench
  - key: canonical-entrypoints
    intent: Preserve the actual live entrypoints instead of promoting wrappers to primary truth.
    rules:
      - scripts/llm_wiki.py is the canonical local wiki-maintenance CLI
      - scripts/incremental_ingest.py is the canonical repeated-export ingest CLI
      - scripts/workbench_api.py is a compatibility wrapper over scripts/workbench/*
      - intelligence/manifests/*.yaml describe contracts but do not replace Python execution
  - key: closed-ingest-boundary
    intent: Keep full ingest closed across artifacts without turning deterministic scripts or YAML into semantic judges.
    rules:
      - scripts/llm_wiki.py ingest is source registration only
      - Full ontology-backed ingest continues through applicable JSONL updates, wiki projection, meta refresh, structural validation, and completion reporting
      - Deterministic scripts may check structure, provenance shape, links, indexes, and required fields
      - Deterministic scripts must not use filename, keyword, token shape, retrieval, graph projection, or YAML contracts as semantic truth
      - If configured LLM or agent judgment is required and unavailable, failed, timed out, or invalid, the semantic stage must be reported as failed, partial, or pending
      - Deterministic fallback text, lexical diagnostics, retrieval output, graph output, or structural validation must not be reported as semantic completion
      - Transport fallback may retry the same configured LLM request, but semantic fallback must not change the judgment owner
      - Accepted claims require explicit review metadata and supporting evidence
      - Pipeline manifests are declarative stage contracts, not runtime executors
