version: 1
purpose: "Lifecycle policy for LLM-generated compile proposals."
proposal_lifecycle:
  compile_proposal:
    initial_status: draft
    analysis_method: llm_compile_proposal
    trust_level: human_review_required
    queryable_before_review: false
    allowed_transitions:
      draft:
        - accepted
        - rejected
      accepted:
        - applied
      rejected: []
      applied: []
