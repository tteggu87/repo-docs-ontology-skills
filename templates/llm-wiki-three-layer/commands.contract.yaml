commands:
  - key: register-source
    purpose: Register a new source file into the canonical source manifest.
    reads:
      - wiki/sources/raw/
      - wiki/policies/
    writes:
      - wiki/sources/manifests/source_manifest.jsonl

  - key: extract-claims
    purpose: Extract claims, entities, and relations from source material into canonical JSONL exports.
    reads:
      - wiki/sources/raw/
      - wiki/policies/extraction_policy.yaml
      - wiki/schemas/
    writes:
      - wiki/exports/claims.jsonl
      - wiki/exports/entities.jsonl
      - wiki/exports/relations.jsonl
      - wiki/exports/ingest_runs.jsonl

  - key: reindex-sqlite
    purpose: Rebuild the SQLite operational index from canonical file-layer surfaces.
    reads:
      - wiki/pages/
      - wiki/sources/manifests/source_manifest.jsonl
      - wiki/policies/
    writes:
      - wiki/state/wiki_index.sqlite

  - key: refresh-duckdb
    purpose: Rebuild or refresh the DuckDB analytical warehouse from canonical exports.
    reads:
      - wiki/sources/manifests/source_manifest.jsonl
      - wiki/exports/
    writes:
      - wiki/state/analytics.duckdb

  - key: verify-drift
    purpose: Detect drift between canonical files and derived operational/analytical layers.
    reads:
      - wiki/pages/
      - wiki/sources/manifests/source_manifest.jsonl
      - wiki/exports/
      - wiki/state/wiki_index.sqlite
      - wiki/state/analytics.duckdb
    writes: []

  - key: show-page-health
    purpose: Inspect page health derived from DuckDB analytical snapshots.
    reads:
      - wiki/state/analytics.duckdb
    writes: []

  - key: show-broken-links
    purpose: Inspect unresolved wiki links from the SQLite operational index.
    reads:
      - wiki/state/wiki_index.sqlite
    writes: []

