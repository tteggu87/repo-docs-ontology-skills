metadata:
  status: Active
  source_of_truth: false
  last_updated: YYYY-MM-DD
  purpose: "Allowed query and task route families across wiki, canonical ontology, graph, and repair flows."

routes:
  - route_key: wiki_lookup
    purpose: "Use the human-facing wiki as the primary reading surface."
    preferred_layers:
      - wiki
    common_uses:
      - summary-oriented answers
      - page-first reading
      - human-readable synthesis
    fallback_route: mixed_lookup
    notes:
      - "Describe when the agent should choose this route after reading repo context."
  - route_key: canonical_lookup
    purpose: "Use canonical ontology truth for provenance, claim state, and evidence checks."
    preferred_layers:
      - canonical_ontology
    common_uses:
      - provenance checks
      - evidence tracing
      - contradiction checks
    fallback_route: mixed_lookup
    notes:
      - "Use this when exact traceability matters more than readability."
  - route_key: graph_expand
    purpose: "Use graph-style neighborhood or path exploration on top of canonical truth."
    preferred_layers:
      - canonical_ontology
      - graph_projection
    common_uses:
      - neighborhood inspection
      - multi-hop path exploration
      - relation tracing
    fallback_route: canonical_lookup
    notes:
      - "Only use when graph-style expansion is actually supported and canonical truth is present."
  - route_key: refresh_operator
    purpose: "Use maintenance, rebuild, validation, or repair workflows instead of answer-only lookup."
    preferred_layers:
      - operator
      - canonical_ontology
    common_uses:
      - rebuilds
      - validation
      - missing-output repair
    fallback_route: canonical_lookup
    notes:
      - "Use this when the user's request is operational rather than informational."
  - route_key: mixed_lookup
    purpose: "Blend wiki readability with canonical verification when both matter."
    preferred_layers:
      - wiki
      - canonical_ontology
    common_uses:
      - readable answer plus traceability
      - compare and verify tasks
      - uncertainty-heavy questions
    fallback_route: wiki_lookup
    notes:
      - "Use when one layer alone would be too weak or too opaque."
