metadata:
  status: Active
  source_of_truth: false
  last_updated: YYYY-MM-DD
  purpose: "Routing gates and fallback policies for query/task handling before answer generation or operator execution."

policies:
  - policy_key: graph_requires_canonical_truth
    applies_to_routes:
      - graph_expand
    condition: "Block graph expansion when canonical ontology registries needed for graph-style exploration are missing."
    block_on_fail: true
    fallback_route: canonical_lookup
    notes:
      - "Do not pretend graph reasoning exists when the ontology substrate is absent or incomplete."
  - policy_key: prefer_wiki_for_readable_summary
    applies_to_routes:
      - wiki_lookup
      - mixed_lookup
    condition: "Prefer wiki lookup when the request is explicitly summary-oriented, page-oriented, or human-reading oriented."
    block_on_fail: false
    fallback_route: mixed_lookup
    notes:
      - "This is a preference policy, not a hard block."
  - policy_key: prefer_canonical_for_provenance
    applies_to_routes:
      - canonical_lookup
      - mixed_lookup
    condition: "Prefer canonical lookup when the request asks for evidence, provenance, citations, contradictions, or claim state."
    block_on_fail: false
    fallback_route: mixed_lookup
    notes:
      - "Use when trust and traceability matter more than summary smoothness."
  - policy_key: route_repairs_to_operator
    applies_to_routes:
      - refresh_operator
    condition: "Use the repair or maintenance route when the user asks for rebuild, refresh, validation, missing outputs, or drift repair."
    block_on_fail: false
    fallback_route: canonical_lookup
    notes:
      - "Do not treat repair work as if it were only a lookup task."
