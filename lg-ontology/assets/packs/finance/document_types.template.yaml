document_types:
  - key: thesis_note
    label: Thesis Note
    description: Investment thesis notes, company memos, and analytical argument summaries.
    default_claim_status: proposed
    evidence_required: true
    recommended_relations:
      - affects
      - estimates
      - revises
      - exposes_risk
      - supports_thesis
    notes: Best for company-level reasoning, thesis support, and risk tracking.

  - key: earnings_note
    label: Earnings Note
    description: Earnings call notes, guidance summaries, and results commentary.
    default_claim_status: proposed
    evidence_required: true
    recommended_relations:
      - affects
      - revises
      - estimates
      - exposes_risk
    notes: Best for estimate changes, guidance moves, and company updates.

  - key: market_update
    label: Market Update
    description: Sector updates, market summaries, and event-driven financial notes.
    default_claim_status: proposed
    evidence_required: true
    recommended_relations:
      - affects
      - exposes_risk
      - supports_thesis
    notes: Best for event/risk interpretation rather than full valuation models.
